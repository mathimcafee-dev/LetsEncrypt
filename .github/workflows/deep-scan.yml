name: SSLVault Deep Scan
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
concurrency:
  group: deep-scan
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Get testssl.sh
        run: |
          git clone --depth 1 https://github.com/drwetter/testssl.sh.git
          bash ./testssl.sh/testssl.sh --version || true
      - name: Run deep scans
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        run: python3 scripts/deepscan.py
